# Rustfmt configuration (stable channel)
edition = "2021"
max_width = 100
tab_spaces = 2
hard_tabs = false
newline_style = "Unix"
reorder_imports = true
comment_width = 100
wrap_comments = true
normalize_comments = true
remove_nested_parens = true
use_try_shorthand = true
use_field_init_shorthand = true